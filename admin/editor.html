<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StartOver Cloud - Page Builder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

    .container { display: grid; grid-template-columns: 300px 1fr 1fr; height: 100vh; gap: 0; }

    .sidebar {
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #333; }
    .sidebar h3 { font-size: 14px; margin-top: 20px; margin-bottom: 10px; color: #666; text-transform: uppercase; font-weight: 600; }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary { background: #07c; color: white; }
    .btn-primary:hover { background: #0059b3; }

    .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #e8e8e8; }

    .btn-small { padding: 8px 12px; font-size: 13px; margin-bottom: 6px; }

    .editor {
      background: white;
      padding: 30px;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    .preview {
      background: white;
      overflow-y: auto;
      padding: 0;
    }

    .preview-inner { padding: 30px; }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #ddd;
    }

    .site-selector {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .page-title-input {
      font-size: 20px;
      font-weight: 600;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 4px;
      margin-bottom: 15px;
      width: 100%;
    }
    .page-title-input:focus { outline: none; border-color: #07c; }

    .save-status { padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; }
    .save-status.success { background: #d4edda; color: #155724; }
    .save-status.error { background: #f8d7da; color: #721c24; }

    .block-wrapper {
      margin-bottom: 30px;
      border: 2px solid #f0f0f0;
      border-radius: 8px;
      overflow: hidden;
      background: #fafafa;
    }

    .block-controls {
      padding: 15px;
      background: #fafafa;
    }

    #blockMenu {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .block-item {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .block-item:hover {
      border-color: #07c;
      box-shadow: 0 4px 12px rgba(0, 119, 204, 0.15);
      transform: translateY(-2px);
    }

    .block-thumbnail {
      width: 100%;
      height: 60px;
      background: linear-gradient(135deg, #f5f7ff 0%, #f0f7ff 100%);
      border: 1px solid #e0eaff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .block-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .block-item-name {
      font-weight: 600;
      font-size: 13px;
      color: #333;
    }

    .block-item-button {
      width: 32px;
      height: 32px;
      border: none;
      background: #07c;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .block-item-button:hover {
      background: #0059b3;
      transform: scale(1.1);
    }

    .block-item-description {
      font-size: 11px;
      color: #999;
      line-height: 1.4;
    }

    .block-controls-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .block-title { font-weight: 600; color: #333; font-size: 14px; }

    .block-remove {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      font-size: 16px;
      color: #999;
      transition: all 0.2s;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .block-remove:hover {
      background: #f5f5f5;
      color: #d32f2f;
    }

    .block-remove-text {
      display: none;
      font-size: 12px;
      color: #d32f2f;
      font-weight: 500;
    }

    .block-remove:hover .block-remove-text {
      display: inline;
    }

    .input-group { margin-bottom: 10px; }
    .input-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
    .input-group input,
    .input-group textarea,
    .input-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
    }
    .input-group textarea { resize: vertical; min-height: 60px; }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.6);
    }

    .modal.show { display: flex; align-items: center; justify-content: center; }

    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header { font-size: 20px; font-weight: 600; margin-bottom: 20px; }

    .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .template-card {
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .template-card:hover { border-color: #07c; box-shadow: 0 4px 12px rgba(0,119,204,0.2); }
    .template-card-icon { font-size: 40px; margin-bottom: 10px; }
    .template-card h4 { font-size: 14px; color: #333; margin-bottom: 5px; }
    .template-card p { font-size: 12px; color: #999; }

    .close-modal { float: right; font-size: 24px; cursor: pointer; color: #999; }
    .close-modal:hover { color: #333; }

    .site-search-container { position: relative; margin-bottom: 20px; }
    .site-search-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
    }
    .site-search-input:focus { outline: none; border-color: #07c; }

    .site-search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .site-search-results.show { display: block; }

    .site-result {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }

    .site-result:hover { background: #f9f9f9; }
    .site-result-name { font-weight: 500; color: #333; font-size: 13px; }
    .site-result-slug { font-size: 11px; color: #999; }

    .current-site { padding: 10px; background: #e8f5ff; border-radius: 6px; margin-bottom: 15px; font-size: 12px; }
    .current-site-label { color: #666; margin-bottom: 4px; }
    .current-site-name { font-weight: 600; color: #07c; }

    .image-upload-zone {
      border: 2px dashed #ddd;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: #f9f9f9;
      transition: all 0.2s;
    }

    .image-upload-zone:hover { border-color: #07c; background: #f0f7ff; }
    .image-upload-zone.dragging { border-color: #07c; background: #e3f2fd; }
    .image-upload-zone input[type="file"] { display: none; }
    .image-upload-text { font-size: 13px; color: #666; }
    .image-upload-loading { color: #999; }

    .image-preview { width: 100%; max-width: 150px; border-radius: 4px; margin-top: 10px; }
    .image-result { margin-top: 10px; font-size: 12px; }
    .image-result-url { background: #f5f5f5; padding: 8px; border-radius: 4px; word-break: break-all; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>🚀 StartOver Cloud</h2>

      <div class="current-site">
        <div class="current-site-label">Editing:</div>
        <div class="current-site-name" id="currentSiteName">example-site</div>
      </div>

      <div class="site-search-container">
        <input type="text" id="siteSearch" class="site-search-input" placeholder="🔍 Search 600+ sites..." onkeyup="searchSites(this.value)">
        <div class="site-search-results" id="siteSearchResults"></div>
      </div>

      <input type="hidden" id="siteSlug" value="example-site">

      <div id="saveStatus"></div>

      <button class="btn btn-primary" onclick="loadPage()">Load Page</button>
      <button class="btn btn-secondary" onclick="savePage()">💾 Save Page</button>

      <h3>Page Layouts</h3>
      <button class="btn btn-secondary" onclick="openTemplatesModal()">📋 Choose Layout</button>

      <h3>Add Block</h3>
      <div id="blockMenu"></div>
    </div>

    <!-- Editor -->
    <div class="editor">
      <input type="text" id="pageTitle" class="page-title-input" placeholder="Page Title" value="Untitled">
      <div id="blocks"></div>
    </div>

    <!-- Preview -->
    <div class="preview">
      <div class="preview-inner" id="preview"></div>
    </div>
  </div>

  <!-- Templates Modal -->
  <div id="templatesModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeTemplatesModal()">&times;</span>
      <div class="modal-header">Choose a Page Layout</div>
      <div class="template-grid" id="templateGrid"></div>
    </div>
  </div>

  <script>
    const blocks = [];
    let allSites = [];

    const templates = {
      'welcome': {
        name: 'Welcome Journey',
        icon: '🎯',
        desc: 'Start your transformation',
        blocks: [
          { type: 'hero', title: 'Welcome to StartOver', subtitle: 'Your journey of transformation begins here', bgColor: '#07c', textColor: 'white' },
          { type: 'text', content: '<h2>Your Path Forward</h2><p>This is the beginning of your real-life transformation game. Take the first step.</p>' },
          { type: 'cta', text: 'Begin Your Journey', link: '#', bgColor: '#07c', textColor: 'white' }
        ]
      },
      'progress': {
        name: 'Transformation Tracker',
        icon: '📈',
        desc: 'Show your progress',
        blocks: [
          { type: 'header', title: 'Your Progress' },
          { type: 'grid', items: [
            {title: 'Challenges Completed', desc: '12 of 30'},
            {title: 'Days Streak', desc: '18 days'},
            {title: 'Community Rank', desc: 'Level 5'}
          ]},
          { type: 'text', content: '<p>Keep pushing forward. Every step counts towards your transformation.</p>' }
        ]
      },
      'community': {
        name: 'Community Hub',
        icon: '👥',
        desc: 'Connect with others',
        blocks: [
          { type: 'hero', title: 'Our Community', subtitle: 'Join thousands on their transformation journey', bgColor: '#4CAF50', textColor: 'white' },
          { type: 'text', content: '<h2>Together We Rise</h2><p>Share your story, support others, grow together.</p>' },
          { type: 'gallery', items: [{image: ''}, {image: ''}, {image: ''}, {image: ''}, {image: ''}, {image: ''}] }
        ]
      },
      'stories': {
        name: 'Success Stories',
        icon: '⭐',
        desc: 'Showcase transformations',
        blocks: [
          { type: 'header', title: 'Real Transformations' },
          { type: 'alternate', image: '', text: '<h3>Jane\'s Story</h3><p>From stuck to unstoppable. See how she transformed her life in 90 days.</p>', imageFirst: false },
          { type: 'alternate', image: '', text: '<h3>Marcus\'s Journey</h3><p>Breaking through limiting beliefs to achieve what seemed impossible.</p>', imageFirst: true }
        ]
      },
      'challenge': {
        name: 'Challenge Page',
        icon: '⚡',
        desc: 'Launch a new challenge',
        blocks: [
          { type: 'hero', title: '30-Day Challenge', subtitle: 'Transform your life in 30 days', bgColor: '#FF5722', textColor: 'white' },
          { type: 'text', content: '<h2>What\'s Included</h2><p>Daily challenges, community support, and real results.</p>' },
          { type: 'grid', items: [
            {title: 'Daily Challenges', desc: 'Guided tasks for transformation'},
            {title: 'Community Support', desc: 'Share wins with others'},
            {title: 'Progress Tracking', desc: 'See your growth in real-time'}
          ]},
          { type: 'cta', text: 'Join the Challenge', link: '#', bgColor: '#FF5722', textColor: 'white' }
        ]
      }
    };

    function formatText(command, value = null) {
      if (command === 'createLink') {
        const url = prompt('Enter URL:');
        if (url) document.execCommand('createLink', false, url);
      } else if (command === 'formatBlock') {
        document.execCommand('formatBlock', false, '<' + value + '>');
      } else {
        document.execCommand(command, false, value);
      }
    }

    function openTemplatesModal() {
      const grid = document.getElementById('templateGrid');
      grid.innerHTML = Object.entries(templates).map(([key, tmpl]) => `
        <div class="template-card" onclick="loadTemplate('${key}'); closeTemplatesModal();">
          <div class="template-card-icon">${tmpl.icon}</div>
          <h4>${tmpl.name}</h4>
          <p>${tmpl.desc}</p>
        </div>
      `).join('');
      document.getElementById('templatesModal').classList.add('show');
    }

    function closeTemplatesModal() {
      document.getElementById('templatesModal').classList.remove('show');
    }

    function quickLoadSite(slug) {
      document.getElementById('siteSlug').value = slug;
      loadPage();
    }

    async function searchSites(query) {
      const resultsDiv = document.getElementById('siteSearchResults');

      if (!query.trim()) {
        resultsDiv.classList.remove('show');
        return;
      }

      if (allSites.length === 0) {
        try {
          const response = await fetch('/api/sites');
          allSites = await response.json();
        } catch (e) {
          console.error('Failed to fetch sites:', e);
          return;
        }
      }

      const filtered = allSites.filter(site =>
        site.slug.toLowerCase().includes(query.toLowerCase()) ||
        site.title.toLowerCase().includes(query.toLowerCase())
      ).slice(0, 10);

      if (filtered.length === 0) {
        resultsDiv.innerHTML = '<div class="site-result" style="cursor: default; color: #999;">No sites found</div>';
      } else {
        resultsDiv.innerHTML = filtered.map(site => `
          <div class="site-result" onclick="loadSiteFromSearch('${site.slug}')">
            <div class="site-result-name">${site.title}</div>
            <div class="site-result-slug">/${site.slug}</div>
          </div>
        `).join('');
      }

      resultsDiv.classList.add('show');
    }

    function loadSiteFromSearch(slug) {
      document.getElementById('siteSlug').value = slug;
      document.getElementById('siteSearch').value = '';
      document.getElementById('siteSearchResults').classList.remove('show');
      loadPage();
    }

    function updateCurrentSiteDisplay() {
      const slug = document.getElementById('siteSlug').value;
      const displayName = allSites.find(s => s.slug === slug)?.title || slug;
      document.getElementById('currentSiteName').textContent = displayName;
    }

    function updatePreviewLive() {
      renderPreview();
    }

    async function uploadImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const response = await fetch('/api/upload', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                file: e.target.result,
                filename: file.name
              })
            });
            const result = await response.json();
            if (result.success) {
              resolve(result.url);
            } else {
              reject(result.error);
            }
          } catch (err) {
            reject(err.message);
          }
        };
        reader.onerror = () => reject('Failed to read file');
        reader.readAsDataURL(file);
      });
    }

    function createImageUploadUI(blockIdx, itemIdx = null) {
      const uploadId = `upload-${blockIdx}-${itemIdx || 'main'}`;
      return `
        <div class="image-upload-zone" onclick="document.getElementById('${uploadId}').click()" ondrop="handleImageDrop(event, ${blockIdx}, ${itemIdx})" ondragover="event.preventDefault(); event.target.closest('.image-upload-zone').classList.add('dragging')" ondragleave="event.target.closest('.image-upload-zone').classList.remove('dragging')">
          <input type="file" id="${uploadId}" accept="image/*" onchange="handleImageUpload(event, ${blockIdx}, ${itemIdx})">
          <div class="image-upload-text">📸 Click to upload or drag image here</div>
        </div>
      `;
    }

    async function handleImageUpload(event, blockIdx, itemIdx) {
      const file = event.target.files[0];
      if (!file) return;

      const uploadZone = event.target.closest('.image-upload-zone');
      uploadZone.classList.add('uploading');
      uploadZone.innerHTML = '<div class="image-upload-loading">⏳ Uploading...</div>';

      try {
        const url = await uploadImage(file);
        if (itemIdx !== null) {
          updateBlockItem(blockIdx, itemIdx, 'image', url);
        } else {
          updateBlock(blockIdx, 'image', url);
        }
      } catch (e) {
        alert('Upload failed: ' + e);
        uploadZone.classList.remove('uploading');
      }
    }

    function handleImageDrop(event, blockIdx, itemIdx) {
      event.preventDefault();
      event.stopPropagation();
      event.target.closest('.image-upload-zone').classList.remove('dragging');

      const files = event.dataTransfer.files;
      if (files.length > 0) {
        const input = document.getElementById(`upload-${blockIdx}-${itemIdx || 'main'}`);
        input.files = files;
        handleImageUpload({ target: input }, blockIdx, itemIdx);
      }
    }

    function loadTemplate(key) {
      const template = templates[key];
      blocks.length = 0;
      blocks.push(...JSON.parse(JSON.stringify(template.blocks)));
      render();
    }

    function addBlock(type) {
      const blockTemplates = {
        header: { type: 'header', title: 'Section Title' },
        hero: { type: 'hero', title: 'Hero Title', subtitle: 'Subtitle', bgColor: '#07c', textColor: 'white' },
        text: { type: 'text', content: '<p>Your content here</p>' },
        grid: { type: 'grid', items: [{title: 'Item 1', desc: 'Description'}, {title: 'Item 2', desc: 'Description'}, {title: 'Item 3', desc: 'Description'}] },
        gallery: { type: 'gallery', items: [{image: ''}, {image: ''}, {image: ''}] },
        alternate: { type: 'alternate', image: '', text: 'Your text here', imageFirst: false },
        video: { type: 'video', videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ', title: 'Video Title' },
        cta: { type: 'cta', text: 'Click Here', link: '#', bgColor: '#07c', textColor: 'white' }
      };
      blocks.push(blockTemplates[type]);
      render();
    }

    function removeBlock(index) {
      blocks.splice(index, 1);
      render();
    }

    let renderTimeout;

    function updateBlock(index, field, value) {
      blocks[index][field] = value;
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(() => {
        renderPreview();
      }, 80);
    }

    function updateBlockItem(blockIndex, itemIndex, field, value) {
      if (!blocks[blockIndex].items) blocks[blockIndex].items = [];
      if (!blocks[blockIndex].items[itemIndex]) blocks[blockIndex].items[itemIndex] = {};
      blocks[blockIndex].items[itemIndex][field] = value;
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(() => {
        renderPreview();
      }, 80);
    }

    function getBlockPreview(block) {
      switch(block.type) {
        case 'header':
          return `<div style="font-size: 20px; font-weight: 600; color: #333;">${block.title}</div>`;
        case 'hero':
          return `<div style="background:${block.bgColor};color:${block.textColor};padding:40px;border-radius:4px;text-align:center;">
            <div style="font-size: 24px; font-weight: 600; margin-bottom: 10px;">${block.title}</div>
            <div style="font-size: 14px; opacity:0.9;">${block.subtitle}</div>
          </div>`;
        case 'text':
          return `<div style="color: #666; font-size: 13px; line-height: 1.5;">📄 Rich Text Content</div>`;
        case 'grid':
          return `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            ${(block.items || []).map(item => `<div style="border: 1px solid #ddd; padding: 10px; border-radius: 4px; font-size: 12px; text-align: center;">${item.title}</div>`).join('')}
          </div>`;
        case 'gallery':
          return `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
            ${(block.items || []).map(() => `<div style="aspect-ratio: 1; background: #f0f0f0; border-radius: 4px; border: 1px dashed #ddd;"></div>`).join('')}
          </div>`;
        case 'alternate':
          return `<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: center;">
            <div style="aspect-ratio: 1; background: #f0f0f0; border-radius: 4px; border: 1px dashed #ddd;"></div>
            <div style="font-size: 12px; color: #666;">📝 Text & Image Alternate</div>
          </div>`;
        case 'video':
          return `<div style="aspect-ratio: 16/9; background: #f0f0f0; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #999;">▶️ Video Embed</div>`;
        case 'cta':
          return `<div style="text-align: center;">
            <div style="display: inline-block; background:${block.bgColor};color:${block.textColor};padding:12px 30px;border-radius:4px;font-weight: 500;">${block.text}</div>
          </div>`;
        default:
          return '';
      }
    }

    function render() {
      renderEditor();
      renderPreview();
    }

    function renderBlockMenu() {
      const menu = document.getElementById('blockMenu');
      const blockTypes = [
        { type: 'header', name: 'Header', icon: '📝', desc: 'Section title' },
        { type: 'hero', name: 'Hero', icon: '🎯', desc: 'Large banner' },
        { type: 'text', name: 'Text', icon: '✍️', desc: 'Rich content' },
        { type: 'grid', name: 'Grid', icon: '📊', desc: '3 columns' },
        { type: 'gallery', name: 'Gallery', icon: '🖼️', desc: 'Image grid' },
        { type: 'alternate', name: 'Alternate', icon: '↔️', desc: 'Text + Image' },
        { type: 'video', name: 'Video', icon: '▶️', desc: 'Embed video' },
        { type: 'cta', name: 'CTA', icon: '🔘', desc: 'Button' }
      ];

      menu.innerHTML = blockTypes.map(b => `
        <div class="block-item" onclick="addBlock('${b.type}')">
          <div class="block-thumbnail">${b.icon}</div>
          <div class="block-item-header">
            <div class="block-item-name">${b.name}</div>
            <button class="block-item-button" onclick="event.stopPropagation(); addBlock('${b.type}');">+</button>
          </div>
          <div class="block-item-description">${b.desc}</div>
        </div>
      `).join('');
    }

    function renderEditor() {
      const container = document.getElementById('blocks');
      container.innerHTML = '';
      blocks.forEach((block, i) => {
        const el = document.createElement('div');
        el.className = 'block-wrapper';
        el.innerHTML = `
          <div class="block-controls">
            <div class="block-controls-header">
              <span class="block-title">${block.type.toUpperCase()}</span>
              <button class="block-remove" onclick="removeBlock(${i})">
                🗑️
                <span class="block-remove-text">remove this block?</span>
              </button>
            </div>
            ${renderBlockEditor(block, i)}
          </div>
        `;
        container.appendChild(el);
      });
    }

    function renderBlockEditor(block, idx) {
      switch(block.type) {
        case 'header':
          return `<div class="input-group">
            <label>Title</label>
            <div contenteditable="true" style="border: 1px solid #ddd; border-radius: 4px; padding: 12px; background: white; font-size: 14px;"  onblur="updateBlock(${idx}, 'title', this.textContent)">${block.title}</div>
          </div>`;
        case 'hero':
          return `<div class="input-group">
            <label>Title</label>
            <div contenteditable="true" style="border: 1px solid #ddd; border-radius: 4px; padding: 12px; background: white; font-size: 14px;"  onblur="updateBlock(${idx}, 'title', this.textContent)">${block.title}</div>
          </div>
          <div class="input-group">
            <label>Subtitle</label>
            <div contenteditable="true" style="border: 1px solid #ddd; border-radius: 4px; padding: 12px; background: white; font-size: 14px; min-height: 60px;" oninput="updateBlock(${idx}, 'subtitle', this.textContent);" onblur="updateBlock(${idx}, 'subtitle', this.textContent)">${block.subtitle}</div>
          </div>
          <div class="input-group">
            <label>Background Color</label>
            <input type="color" value="${block.bgColor}" onchange="updateBlock(${idx}, 'bgColor', this.value);">
          </div>`;
        case 'text':
          return `<div class="input-group">
            <label>Content</label>
            <div id="editor-${idx}" class="wysiwyg-editor" contenteditable="true" style="border: 1px solid #ddd; border-radius: 4px; padding: 12px; min-height: 100px; background: white; font-size: 14px; line-height: 1.5;"  onblur="updateBlock(${idx}, 'content', this.innerHTML)">${block.content || ''}</div>
            <div style="display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;">
              <button type="button" onclick="formatText('bold')" style="padding: 6px 10px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 12px;"><b>B</b></button>
              <button type="button" onclick="formatText('italic')" style="padding: 6px 10px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 12px;"><i>I</i></button>
              <button type="button" onclick="formatText('underline')" style="padding: 6px 10px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 12px;"><u>U</u></button>
              <button type="button" onclick="formatText('insertUnorderedList')" style="padding: 6px 10px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 12px;">• List</button>
              <button type="button" onclick="formatText('createLink')" style="padding: 6px 10px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 12px;">🔗 Link</button>
              <button type="button" onclick="formatText('formatBlock', 'h2')" style="padding: 6px 10px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 12px;">H2</button>
              <button type="button" onclick="formatText('formatBlock', 'h3')" style="padding: 6px 10px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 12px;">H3</button>
            </div>
          </div>`;
        case 'grid':
          return (block.items || []).map((item, i) => `
            <div class="input-group">
              <label>Item ${i+1} Title</label>
              <div contenteditable="true" style="border: 1px solid #ddd; border-radius: 4px; padding: 8px; background: white;" oninput="updateBlockItem(${idx}, ${i}, 'title', this.textContent);" onblur="updateBlockItem(${idx}, ${i}, 'title', this.textContent)">${item.title || ''}</div>
              <label style="margin-top: 8px;">Description</label>
              <div contenteditable="true" style="border: 1px solid #ddd; border-radius: 4px; padding: 8px; background: white; min-height: 50px;" oninput="updateBlockItem(${idx}, ${i}, 'desc', this.textContent);" onblur="updateBlockItem(${idx}, ${i}, 'desc', this.textContent)">${item.desc || ''}</div>
            </div>
          `).join('');
        case 'gallery':
          return (block.items || []).map((item, i) => `
            <div class="input-group">
              <label>Image ${i+1}</label>
              ${createImageUploadUI(idx, i)}
              ${item.image ? `<div class="image-result"><img src="${item.image}" class="image-preview" onerror="this.style.display='none'"><div class="image-result-url">${item.image}</div></div>` : ''}
            </div>
          `).join('');
        case 'alternate':
          return `<div class="input-group">
            <label>Image</label>
            ${createImageUploadUI(idx)}
            ${block.image ? `<div class="image-result"><img src="${block.image}" class="image-preview" onerror="this.style.display='none'"><div class="image-result-url">${block.image}</div></div>` : ''}
          </div>
          <div class="input-group">
            <label>Text Content</label>
            <div contenteditable="true" style="border: 1px solid #ddd; border-radius: 4px; padding: 8px; background: white; min-height: 60px;" oninput="updateBlock(${idx}, 'text', this.innerHTML)" onblur="updateBlock(${idx}, 'text', this.innerHTML)">${block.text || ''}</div>
          </div>
          <div class="input-group">
            <label><input type="checkbox" ${block.imageFirst ? 'checked' : ''} onchange="updateBlock(${idx}, 'imageFirst', this.checked);"> Image First</label>
          </div>`;
        case 'video':
          return `<div class="input-group">
            <label>Video URL (embed)</label>
            <input type="text" value="${block.videoUrl}" onchange="updateBlock(${idx}, 'videoUrl', this.value)">
          </div>
          <div class="input-group">
            <label>Title</label>
            <input type="text" value="${block.title || ''}" onchange="updateBlock(${idx}, 'title', this.value)">
          </div>`;
        case 'cta':
          return `<div class="input-group">
            <label>Button Text</label>
            <div contenteditable="true" style="border: 1px solid #ddd; border-radius: 4px; padding: 10px; background: white;" oninput="updateBlock(${idx}, 'text', this.textContent);" onblur="updateBlock(${idx}, 'text', this.textContent)">${block.text}</div>
          </div>
          <div class="input-group">
            <label>Link URL</label>
            <input type="text" value="${block.link}" onchange="updateBlock(${idx}, 'link', this.value);">
          </div>
          <div class="input-group">
            <label>Background Color</label>
            <input type="color" value="${block.bgColor || '#07c'}" onchange="updateBlock(${idx}, 'bgColor', this.value);">
          </div>`;
        default: return '';
      }
    }

    function renderPreview() {
      const container = document.getElementById('preview');
      const title = document.getElementById('pageTitle').value;
      let html = `<h1 style="margin-bottom:30px;color:#333;">${title}</h1>`;

      blocks.forEach(block => {
        switch(block.type) {
          case 'header':
            html += `<h2 style="margin:30px 0 15px;font-size:28px;color:#333;">${block.title}</h2>`;
            break;
          case 'hero':
            html += `<div style="background:${block.bgColor};color:${block.textColor};padding:60px 40px;border-radius:8px;text-align:center;margin:30px 0;">
              <h2 style="font-size:36px;margin-bottom:15px;">${block.title}</h2>
              <p style="font-size:18px;opacity:0.9;">${block.subtitle}</p>
            </div>`;
            break;
          case 'text':
            html += `<div style="margin:30px 0;line-height:1.6;color:#555;">${block.content}</div>`;
            break;
          case 'grid':
            html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:30px 0;">
              ${(block.items || []).map(item => `
                <div style="border:1px solid #ddd;padding:20px;border-radius:8px;">
                  <h3 style="margin-bottom:10px;color:#333;">${item.title}</h3>
                  <p style="color:#666;font-size:14px;">${item.desc}</p>
                </div>
              `).join('')}
            </div>`;
            break;
          case 'gallery':
            html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:30px 0;">
              ${(block.items || []).map(item => `
                <img src="${item.image || '/assets/placeholder.jpg'}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;">
              `).join('')}
            </div>`;
            break;
          case 'alternate':
            const cols = block.imageFirst ? 'auto 1fr' : '1fr auto';
            html += `<div style="display:grid;grid-template-columns:${cols};gap:40px;align-items:center;margin:30px 0;">
              <img src="${block.image || '/assets/placeholder.jpg'}" style="width:100%;border-radius:8px;">
              <div style="line-height:1.6;color:#555;">${block.text}</div>
            </div>`;
            break;
          case 'video':
            html += `<div style="margin:30px 0;">
              ${block.title ? `<h3 style="margin-bottom:15px;color:#333;">${block.title}</h3>` : ''}
              <iframe width="100%" height="400" src="${block.videoUrl}" frameborder="0" allowfullscreen style="border-radius:8px;"></iframe>
            </div>`;
            break;
          case 'cta':
            html += `<div style="text-align:center;margin:40px 0;padding:30px;background:#f9f9f9;border-radius:8px;">
              <a href="${block.link}" style="display:inline-block;background:${block.bgColor || '#07c'};color:${block.textColor || 'white'};padding:15px 40px;border-radius:6px;text-decoration:none;font-weight:bold;font-size:16px;">${block.text}</a>
            </div>`;
            break;
        }
      });

      container.innerHTML = html;
    }

    async function savePage() {
      const status = document.getElementById('saveStatus');
      try {
        const slug = document.getElementById('siteSlug').value || 'example-site';
        const title = document.getElementById('pageTitle').value;
        const preview = document.getElementById('preview').innerHTML;

        const response = await fetch('/api/pages/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slug: slug,
            html: `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    a { color: #07c; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .edit-button-fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      background: #07c;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(7, 119, 204, 0.4);
      transition: all 0.3s;
      z-index: 999;
      text-decoration: none;
    }

    .edit-button-fab:hover {
      background: #0059b3;
      box-shadow: 0 6px 20px rgba(7, 119, 204, 0.6);
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="container">
    ${preview}
  </div>
  <hr style="margin: 40px 0; border: none; border-top: 1px solid #ddd;">
  <footer style="text-align: center; padding: 20px; color: #999; font-size: 12px;">
    <p>Built with StartOver Cloud</p>
  </footer>

  <a href="/admin/editor?site=${slug}" class="edit-button-fab" title="Edit this page">✏️</a>
</body>
</html>`
          })
        });

        const result = await response.json();
        if (result.success) {
          status.innerHTML = `<div class="save-status success">✓ Saved to /sites/${result.slug}/</div>`;
          setTimeout(() => { status.innerHTML = ''; }, 3000);
        }
      } catch (e) {
        status.innerHTML = `<div class="save-status error">✗ Error: ${e.message}</div>`;
      }
    }

    async function loadPage() {
      try {
        const slug = document.getElementById('siteSlug').value || 'example-site';
        const response = await fetch(`/api/pages/${slug}`);
        const data = await response.json();

        if (data.html) {
          const titleMatch = data.html.match(/<title>(.*?)<\/title>/);
          if (titleMatch) document.getElementById('pageTitle').value = titleMatch[1];
          blocks.length = 0;
          blocks.push({ type: 'text', content: '<p>Loaded page - edit blocks to customize</p>' });
          render();
        }
        updateCurrentSiteDisplay();
      } catch (e) {
        alert('Page not found. Starting with empty page.');
        blocks.length = 0;
        render();
        updateCurrentSiteDisplay();
      }
    }

    async function initializeSitesList() {
      try {
        const response = await fetch('/api/sites');
        allSites = await response.json();
      } catch (e) {
        console.error('Failed to load sites list:', e);
      }
    }

    const params = new URLSearchParams(window.location.search);
    initializeSitesList().then(() => {
      if (params.get('site')) {
        document.getElementById('siteSlug').value = params.get('site');
        loadPage();
      } else {
        loadTemplate('welcome');
        updateCurrentSiteDisplay();
      }

      renderBlockMenu();
      render();
    });
  </script>
</body>
</html>
