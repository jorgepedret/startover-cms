# Nginx configuration for startover.world redirects
# Add this to your nginx config file at /etc/nginx/sites-available/startover.world
# or /etc/nginx/conf.d/startover.world.conf

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name startover.world;

    # SSL certificates (adjust paths as needed)
    # ssl_certificate /etc/ssl/certs/startover.world.crt;
    # ssl_certificate_key /etc/ssl/private/startover.world.key;

    # Root directory for index.html
    root /var/www/startover;

    # Serve index.html and style.css directly
    location = / {
        try_files /index.html =404;
    }

    location = /style.css {
        try_files /style.css =404;
    }

    location = /favicon.ico {
        try_files /favicon.ico =404;
    }

    # Redirect all /{slug} paths to mystrikingly
    # Match any path that looks like /{slug} and redirect to mystrikingly
    location ~ ^/([a-z0-9\-]+)/?$ {
        set $slug $1;
        return 301 https://$slug.mystrikingly.com;
    }

    # Default: serve index.html for root
    location / {
        try_files /index.html =404;
    }
}

# Nginx configuration for subdomain redirects
# Add this as a separate server block, or combine with above

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Match any subdomain pattern (except www and startover)
    server_name ~^(?!www\.|startover\.)[a-z0-9\-]+\.startover\.world$;

    # SSL certificates (same as above)
    # ssl_certificate /etc/ssl/certs/startover.world.crt;
    # ssl_certificate_key /etc/ssl/private/startover.world.key;

    # Extract subdomain and redirect to mystrikingly
    set $slug $host;
    # Remove .startover.world suffix
    if ($slug ~ ^([a-z0-9\-]+)\.startover\.world$) {
        set $slug $1;
        return 301 https://$slug.mystrikingly.com;
    }
}
