<script>
// Offline backup patch: redirect CDN images to local assets and fix navigation links
(function() {
  // Build a map from storageKey to local asset path
  var assetBase = "/assets/custom-images/";

  // Override all img src that point to strikinglycdn
  function fixImages() {
    document.querySelectorAll('img').forEach(function(img) {
      var src = img.getAttribute('src') || '';
      var dataSrc = img.getAttribute('data-src') || '';

      function localizeUrl(url) {
        if (!url) return url;
        // Match: //custom-images.strikinglycdn.com/res/.../ACCOUNTID/FILENAME.EXT
        var m = url.match(/\/\/(?:custom-images|user-images)\.strikinglycdn\.com\/res\/[^\/]+\/image\/upload\/[^\/]+\/([0-9]+)\/([^?#]+)/);
        if (m) return assetBase + m[1] + "/" + m[2];
        return url;
      }

      var newSrc = localizeUrl(src);
      if (newSrc !== src) img.setAttribute('src', newSrc);
      var newDataSrc = localizeUrl(dataSrc);
      if (newDataSrc !== dataSrc) img.setAttribute('data-src', newDataSrc);
    });

    // Fix all <a> href that are "http://slug.html" (absolute) -> "slug.html" (relative)
    document.querySelectorAll('a[href]').forEach(function(a) {
      var href = a.getAttribute('href');
      if (href && /^https?:\/\/[\w-]+\.html/.test(href)) {
        a.setAttribute('href', href.replace(/^https?:\/\//, ''));
      }
    });

    // Fix background images in data-bg
    document.querySelectorAll('[data-bg]').forEach(function(el) {
      var bg = el.getAttribute('data-bg');
      if (bg && bg.indexOf('strikinglycdn') !== -1) {
        var m = bg.match(/\/\/(?:custom-images|user-images)\.strikinglycdn\.com\/res\/[^\/]+\/image\/upload\/[^\/]+\/([0-9]+)\/([^?#]+)/);
        if (m) {
          var local = assetBase + m[1] + "/" + m[2];
          el.setAttribute('data-bg', local);
          el.style.backgroundImage = 'url("' + local + '")';
        }
      }
    });
  }

  // Run after DOM is fully loaded and after Strikingly JS has rendered
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(fixImages, 500); });
  } else {
    setTimeout(fixImages, 500);
  }
  // Also run after a longer delay to catch lazy-loaded content
  setTimeout(fixImages, 2000);
  setTimeout(fixImages, 5000);
})();
</script>
